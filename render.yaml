## Render Blueprint (Infrastructure-as-Code)
##
## Optional. Instead of clicking through the Render dashboard, you can
## commit this file to the repo root and use Render's "New +" -> "Blueprint"
## flow, point it at your GitHub repo, and Render will create both services
## below automatically. You will still be prompted to fill in the env vars
## marked "sync: false" (secrets Render will not generate on its own),
## since the Aiven database lives outside Render and can't be auto-wired.
##
## See DEPLOYMENT.md for the full manual, step-by-step walkthrough.

services:
  # ---------------------------------------------------------------------
  # Backend: Spring Boot API, deployed from backend/Dockerfile
  # ---------------------------------------------------------------------
  - type: web
    name: life-erp-backend
    runtime: docker
    plan: starter
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_STORAGE_ROOT
        value: /app/storage

  # ---------------------------------------------------------------------
  # Frontend: React/Vite static build, served from Render's static CDN
  # ---------------------------------------------------------------------
  - type: web
    name: life-erp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
